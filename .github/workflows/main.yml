name: Docker Build

on:
  push:
    branches: [main, master, hotfix/*]
  pull_request:
    branches: [ main, master ]

jobs:

  pick-runner:
    name: Pick runner
    # Belt-and-braces for a probe-JOB failure (e.g. GitHub cannot resolve
    # the action itself — the one mode fallback-on-error cannot catch, since
    # it never gets to run): continue-on-error keeps this job's conclusion
    # green with empty outputs, so consumers run on their runs-on fallback
    # default instead of being SKIPPED. Without this, a consumer lacking a
    # status-check function in its `if:` is skipped on probe failure — and a
    # skipped required check PASSES branch protection with the gate never
    # having run.
    continue-on-error: true
    runs-on: ubuntu-latest
    outputs:
      linux: ${{ steps.linux.outputs.use-runner }}
    steps:
      # Self-hosting is OPTIONAL. fallback-on-error guarantees a GitHub-hosted
      # runner whenever no self-hosted runner is online or the token cannot
      # list runners — this job never fails the workflow. PA_TOKEN (org-level
      # secret) can see org/repo runners; the ambient token is the last resort.
      # Temporary opt-out (e.g. a job misbehaving on the self-hosted box):
      # set the repo or org Actions VARIABLE NO_SELFHOSTED=true — or
      # NO_SELFHOSTED_LINUX / NO_SELFHOSTED_MACOS for one lane — to skip the
      # probe; a skipped probe's empty output makes the runs-on fallback
      # default take over (GitHub-hosted). Flipping it needs no commit.
      - name: Detect linux runner
        id: linux
        if: vars.NO_SELFHOSTED != 'true' && vars.NO_SELFHOSTED_LINUX != 'true'
        uses: mikehardy/runner-fallback-action@dc7732f9e532c451b2527b288ba8d58fd4b0a4ca #v1.1.0
        with:
          primary-runner: "debian-selfhosted"
          fallback-runner: "ubuntu-latest"
          fallback-on-error: "true"
          github-token: ${{ secrets.PA_TOKEN || github.token }}

  build:
    needs:
      - pick-runner

    name: Build
    if: |
      !contains(github.event.head_commit.message, 'ci skip')
      && !contains(github.event.pull_request.title, 'ci skip')
    runs-on: ${{ fromJSON(needs.pick-runner.outputs.linux || '["ubuntu-latest"]') }}
    steps:

    - name: Check out code
      uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab #v3.5.2

    - name: docker
      uses: docker://docker:29.6.2@sha256:bfec1f5159c63a81ca6fdedbd81404d2c0e16378ed0feec3bb3fbf3998847659
      with:
        args: /bin/sh -c "apk update && apk add bash && /bin/bash ./ci.build.sh"
      env:
        REGISTRY_ENDPOINT: registry.hub.docker.com
        REGISTRY_REPO: dockerdig/hello-world
        REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
        REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        GITHUB_PR_SHA: ${{ github.event.pull_request.head.sha }}

  dispatch:
    needs: build
    strategy:
      matrix:
        repo: ["aweps/demo-ops","slaystack/xops"]

    name: Dispatch
    runs-on: ubuntu-latest
    steps:

     - name: Repository Dispatch
       uses: peter-evans/repository-dispatch@26b39ed245ab8f31526069329e112ab2fb224588 #v2.1.1
       with:
         token: ${{ secrets.PA_TOKEN }}
         repository: ${{ matrix.repo }}
         event-type: ops_update
         client-payload: '{ "app" : "demo","dependency_type" : "main","github": ${{ tojson(github) }}}'

 #curl -vs --request POST   --url https://api.github.com/repos/slaystack/xops/dispatches   --header "authorization: token ${PA_TOKEN}"   --header 'Accept: application/vnd.github.everest-preview+json'   --header 'content-type: application/json'   --data '{"event_type": "ops_update","client_payload": {"app" : "demo","dependency_type" : "demo","github" : {"ref": "refs/heads/master","sha": "5e06ae0aa5caa5b4a18adaed27021f0a1cb86e8f","repository": "aweps/demo"}}}'
